<!DOCTYPE html>

<style>
  :root{
    --bg:#f8fafc;--surface:#ffffff;--surface-2:#f1f5f9;--border:#e2e8f0;
    --text:#0f172a;--text-muted:#64748b;--accent:#6366f1;--accent-hover:#4f46e5;
    --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
  }
  .dark{
    --bg:#0b1020;--surface:#121829;--surface-2:#1a2236;--border:#1f2940;
    --text:#e2e8f0;--text-muted:#94a3b8;--accent:#818cf8;--accent-hover:#6366f1;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',ui-sans-serif,system-ui,sans-serif}
  .surface{background:var(--surface);border:1px solid var(--border)}
  .surface-2{background:var(--surface-2)}
  .border-app{border-color:var(--border)}
  .text-muted{color:var(--text-muted)}
  .accent{color:var(--accent)}
  .bg-accent{background:var(--accent)}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .8rem;border-radius:.5rem;font-size:.85rem;font-weight:500;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
  .btn:hover{background:var(--surface-2)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{border-color:transparent;background:transparent}
  .btn-ghost:hover{background:var(--surface-2)}
  .input,.textarea,select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:.55rem .7rem;font-size:.85rem;color:var(--text);outline:none;transition:border .15s}
  .input:focus,.textarea:focus,select:focus{border-color:var(--accent)}
  .textarea{font-family:'JetBrains Mono',ui-monospace,monospace;resize:vertical;min-height:160px}
  .chip{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .5rem;border-radius:.35rem;font-size:.7rem;font-weight:500;background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tool-card{cursor:pointer;transition:all .15s}
  .tool-card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .tool-card.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
  .nav-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-radius:.5rem;font-size:.85rem;cursor:pointer;color:var(--text-muted)}
  .nav-item:hover{background:var(--surface-2);color:var(--text)}
  .nav-item.active{background:var(--accent);color:#fff}
  .nav-item.active svg{color:#fff}
  .scroll-thin::-webkit-scrollbar{width:6px;height:6px}
  .scroll-thin::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  pre.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:.78rem;white-space:pre-wrap;word-break:break-all}
  .badge{padding:.15rem .45rem;border-radius:.3rem;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .drop-zone{border:2px dashed var(--border);border-radius:.75rem;padding:1.5rem;text-align:center;transition:all .2s}
  .drop-zone.drag-over{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}
  .tree{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:.78rem;line-height:1.5}
  .tree-node{padding-left:1rem;border-left:1px dashed var(--border);margin-left:.5rem}
  details>summary{cursor:pointer;list-style:none;user-select:none}
  details>summary::-webkit-details-marker{display:none}
  details>summary::before{content:'▶';display:inline-block;margin-right:.3rem;font-size:.6rem;transition:transform .15s}
  details[open]>summary::before{transform:rotate(90deg)}
  .split-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
  @media(max-width:768px){.split-grid{grid-template-columns:1fr}}
  .highlight-match{background:color-mix(in srgb,var(--warning) 40%,transparent);border-radius:2px}
  .hex-row{display:grid;grid-template-columns:80px 1fr 200px;gap:1rem;font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.15rem .5rem}
  .hex-row:hover{background:var(--surface-2)}
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1rem;border-radius:.5rem;background:var(--text);color:var(--bg);font-size:.85rem;z-index:100;animation:slideIn .2s}
  @keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
  .sidebar{transition:transform .2s}
  @media(max-width:1024px){.sidebar{position:fixed;top:0;left:0;height:100vh;z-index:50;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,var(--bg) 0%,var(--surface-2) 100%)}
  .login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:2rem;box-shadow:0 10px 40px rgba(0,0,0,.08)}
  .code-input{font-family:'JetBrains Mono',monospace;letter-spacing:.3em;text-align:center;font-size:1.1rem;text-transform:uppercase}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>

<body>
<div id="app" class="min-h-screen flex"></div>

<script>
/* ============================================================
   UNIVERSAL DATA CONVERTER & DECODER
   Fully client-side. Modular architecture.
   ============================================================ */

// ---------- STATE ----------
const State = {
  theme: localStorage.getItem('udc-theme') || 'light',
  activeCategory: 'encoding',
  activeTool: 'base64',
  search: '',
  favorites: JSON.parse(localStorage.getItem('udc-favs') || '[]'),
  history: JSON.parse(localStorage.getItem('udc-history') || '[]'),
  sidebarOpen: false,
};

function saveState() {
  localStorage.setItem('udc-theme', State.theme);
  localStorage.setItem('udc-favs', JSON.stringify(State.favorites));
  localStorage.setItem('udc-history', JSON.stringify(State.history.slice(0, 50)));
}

function addHistory(tool, input, output) {
  if (!input || !output) return;
  State.history.unshift({
    tool, input: String(input).slice(0, 200), output: String(output).slice(0, 200),
    ts: Date.now()
  });
  State.history = State.history.slice(0, 50);
  saveState();
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

function copyText(t) {
  navigator.clipboard.writeText(t).then(() => toast('Copied'));
}

// ---------- CONVERSION ENGINES ----------
const Conv = {
  // Base64
  base64Encode: s => { try { return btoa(unescape(encodeURIComponent(s))); } catch(e){ return 'Error: '+e.message; }},
  base64Decode: s => { try { return decodeURIComponent(escape(atob(s.replace(/\s/g,'')))); } catch(e){ return 'Error: invalid Base64'; }},
  // URL
  urlEncode: s => encodeURIComponent(s),
  urlDecode: s => { try { return decodeURIComponent(s); } catch(e){ return 'Error: invalid URL encoding'; }},
  // HTML entities
  htmlEncode: s => s.replace(/[&<>"'`=\/]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;','=':'&#61;','/':'&#47;'})[c]),
  htmlDecode: s => { const d = document.createElement('div'); d.innerHTML = s; return d.textContent || d.innerText || ''; },
  // Unicode
  unicodeEncode: s => [...s].map(c => '\\u' + c.charCodeAt(0).toString(16).padStart(4,'0')).join(''),
  unicodeDecode: s => s.replace(/\\u([\dA-Fa-f]{4})/g, (_,h)=>String.fromCharCode(parseInt(h,16))),
  // ASCII
  asciiEncode: s => [...s].map(c=>c.charCodeAt(0)).join(' '),
  asciiDecode: s => s.trim().split(/\s+/).map(n=>String.fromCharCode(parseInt(n,10))).join(''),
  // Hex
  hexEncode: s => [...new TextEncoder().encode(s)].map(b=>b.toString(16).padStart(2,'0')).join(' '),
  hexDecode: s => { try { const bytes = s.replace(/[^0-9a-fA-F]/g,'').match(/.{1,2}/g)||[]; return new TextDecoder().decode(new Uint8Array(bytes.map(b=>parseInt(b,16)))); } catch(e){ return 'Error'; }},
  // Binary
  binaryEncode: s => [...new TextEncoder().encode(s)].map(b=>b.toString(2).padStart(8,'0')).join(' '),
  binaryDecode: s => { try { const bits = s.replace(/[^01]/g,'').match(/.{1,8}/g)||[]; return new TextDecoder().decode(new Uint8Array(bits.map(b=>parseInt(b,2)))); } catch(e){ return 'Error'; }},
  // ROT13
  rot13: s => s.replace(/[a-zA-Z]/g, c => String.fromCharCode((c<='Z'?90:122) >= (c.charCodeAt(0)+13) ? c.charCodeAt(0)+13 : c.charCodeAt(0)-13)),
  // Quoted-Printable
  qpEncode: s => {
    const bytes = new TextEncoder().encode(s);
    let out = '';
    for (const b of bytes) {
      if ((b>=33 && b<=126 && b!==61) || b===32 || b===9) out += String.fromCharCode(b);
      else out += '=' + b.toString(16).toUpperCase().padStart(2,'0');
    }
    return out.replace(/(.{73})/g, '$1=\r\n');
  },
  qpDecode: s => {
    s = s.replace(/=\r?\n/g, '');
    const bytes = [];
    for (let i=0; i<s.length; i++) {
      if (s[i]==='=' && i+2<s.length) {
        bytes.push(parseInt(s.substr(i+1,2),16)); i+=2;
      } else bytes.push(s.charCodeAt(i));
    }
    try { return new TextDecoder().decode(new Uint8Array(bytes)); } catch(e){ return 'Error'; }
  },
  // MIME encoded-word
  mimeDecode: s => s.replace(/=\?([^?]+)\?([BbQq])\?([^?]+)\?=/g, (_, charset, enc, txt) => {
    if (enc.toUpperCase()==='B') return Conv.base64Decode(txt);
    return Conv.qpDecode(txt.replace(/_/g,' '));
  }),
  // UUEncode / UUDecode
  uuEncode: s => {
    const bytes = new TextEncoder().encode(s);
    let out = 'begin 644 file\n';
    for (let i=0; i<bytes.length; i+=45) {
      const chunk = bytes.slice(i, i+45);
      out += String.fromCharCode(chunk.length + 32);
      for (let j=0; j<chunk.length; j+=3) {
        const b1 = chunk[j]||0, b2 = chunk[j+1]||0, b3 = chunk[j+2]||0;
        out += String.fromCharCode(((b1>>2)&0x3F)+32);
        out += String.fromCharCode((((b1<<4)|(b2>>4))&0x3F)+32);
        out += String.fromCharCode((((b2<<2)|(b3>>6))&0x3F)+32);
        out += String.fromCharCode((b3&0x3F)+32);
      }
      out += '\n';
    }
    return out + '`\nend';
  },
  uuDecode: s => {
    const lines = s.split('\n').filter(l => l && !l.startsWith('begin') && !l.startsWith('end') && l!=='`');
    const bytes = [];
    for (const line of lines) {
      const len = line.charCodeAt(0) - 32;
      if (len <= 0) continue;
      let count = 0;
      for (let i=1; i<line.length && count<len; i+=4) {
        const c1 = (line.charCodeAt(i)-32)&0x3F;
        const c2 = (line.charCodeAt(i+1)-32)&0x3F;
        const c3 = (line.charCodeAt(i+2)-32)&0x3F;
        const c4 = (line.charCodeAt(i+3)-32)&0x3F;
        if (count<len){bytes.push((c1<<2)|(c2>>4));count++;}
        if (count<len){bytes.push(((c2<<4)|(c3>>2))&0xFF);count++;}
        if (count<len){bytes.push(((c3<<6)|c4)&0xFF);count++;}
      }
    }
    try { return new TextDecoder().decode(new Uint8Array(bytes)); } catch(e){ return 'Error'; }
  },
  // Punycode (simple ASCII fallback using URL API)
  punyEncode: s => { try { return new URL('http://' + s).hostname; } catch(e){ return 'Error'; }},
  punyDecode: s => { try { const u = new URL('http://' + s); return decodeURIComponent(u.hostname); } catch(e){ return 'Error'; }},
  // JWT
  jwtDecode: s => {
    const parts = s.trim().split('.');
    if (parts.length !== 3) return { error: 'Invalid JWT format (expected 3 parts)' };
    try {
      const decode = p => JSON.parse(decodeURIComponent(escape(atob(p.replace(/-/g,'+').replace(/_/g,'/')))));
      return { header: decode(parts[0]), payload: decode(parts[1]), signature: parts[2] };
    } catch(e) { return { error: e.message }; }
  },
};

// ---------- SMART DETECTOR ----------
function detectFormat(s) {
  if (!s || !s.trim()) return [];
  const t = s.trim();
  const results = [];
  // JWT
  if (/^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(t)) results.push({type:'JWT', confidence:95});
  // JSON
  try { JSON.parse(t); results.push({type:'JSON', confidence:90}); } catch(e){}
  // XML/HTML
  if (/^\s*<\?xml/i.test(t)) results.push({type:'XML', confidence:95});
  else if (/<\/?[a-z][\s\S]*>/i.test(t)) {
    if (/<html|<body|<head|<!DOCTYPE/i.test(t)) results.push({type:'HTML', confidence:90});
    else results.push({type:'HTML/XML', confidence:70});
  }
  // Base64
  if (/^[A-Za-z0-9+/]+=*$/.test(t.replace(/\s/g,'')) && t.length>=4 && t.length%4===0) {
    results.push({type:'Base64', confidence:75});
  }
  // URL Encoded
  if (/%[0-9A-Fa-f]{2}/.test(t)) results.push({type:'URL Encoded', confidence:80});
  // Quoted-Printable
  if (/=[0-9A-F]{2}/.test(t) && /=\r?\n|=\s*$/.test(t)) results.push({type:'Quoted-Printable', confidence:80});
  // Hex
  if (/^[0-9a-fA-F\s]+$/.test(t) && t.replace(/\s/g,'').length%2===0 && t.replace(/\s/g,'').length>=4) results.push({type:'Hex', confidence:60});
  // Binary
  if (/^[01\s]+$/.test(t) && t.replace(/\s/g,'').length%8===0) results.push({type:'Binary', confidence:80});
  // MIME email
  if (/^(From|Subject|To|Received|Content-Type|MIME-Version):/im.test(t)) results.push({type:'MIME Email', confidence:90});
  return results.sort((a,b)=>b.confidence-a.confidence);
}

// ---------- HTML TOOLS ----------
function htmlToText(html, opts={}) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  if (opts.removeScripts !== false) doc.querySelectorAll('script').forEach(n=>n.remove());
  if (opts.removeStyles !== false) doc.querySelectorAll('style').forEach(n=>n.remove());
  if (opts.removeComments !== false) {
    const walker = doc.createTreeWalker(doc, NodeFilter.SHOW_COMMENT);
    const comments = [];
    while (walker.nextNode()) comments.push(walker.currentNode);
    comments.forEach(c => c.remove());
  }
  if (opts.preserveLinks) {
    doc.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (href) a.textContent = `${a.textContent} (${href})`;
    });
  }
  let text = doc.body ? doc.body.textContent : doc.documentElement.textContent;
  if (opts.preserveBreaks !== false) text = text.replace(/\n\s*\n/g,'\n\n');
  return text.trim();
}

function analyzeHtml(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  return {
    title: doc.title || '(none)',
    metas: [...doc.querySelectorAll('meta')].map(m=>({
      name: m.getAttribute('name')||m.getAttribute('property')||m.getAttribute('http-equiv')||'',
      content: m.getAttribute('content')||''
    })).filter(m=>m.name),
    images: [...doc.querySelectorAll('img')].map(i=>({src:i.getAttribute('src'),alt:i.getAttribute('alt')||''})),
    links: [...doc.querySelectorAll('a[href]')].map(a=>({href:a.getAttribute('href'),text:(a.textContent||'').trim().slice(0,80)})),
    css: [...doc.querySelectorAll('link[rel=stylesheet]')].map(l=>l.getAttribute('href')),
    scripts: [...doc.querySelectorAll('script[src]')].map(s=>s.getAttribute('src')),
    forms: [...doc.querySelectorAll('form')].map(f=>({action:f.getAttribute('action')||'',method:f.getAttribute('method')||'GET',inputs:f.querySelectorAll('input,select,textarea').length})),
  };
}

function textToHtml(text, opts={}) {
  let escaped = Conv.htmlEncode(text);
  if (opts.autoLink) escaped = escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1">$1</a>');
  if (opts.mode === 'paragraphs') {
    return escaped.split(/\n\s*\n/).map(p => `<p>${p.replace(/\n/g,'<br/>')}</p>`).join('\n');
  }
  if (opts.mode === 'email') {
    const inner = escaped.split(/\n\s*\n/).map(p => `<p style="margin:0 0 1em 0;font-family:Arial,sans-serif;color:#333">${p.replace(/\n/g,'<br/>')}</p>`).join('\n');
    return `<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#f4f4f4"><tr><td align="center"><table cellpadding="20" cellspacing="0" border="0" width="600" style="background:#fff"><tr><td>${inner}</td></tr></table></td></tr></table>`;
  }
  return escaped.replace(/\n/g,'<br/>');
}

// ---------- MIME / EML PARSER ----------
function parseEml(raw) {
  const headerEnd = raw.search(/\r?\n\r?\n/);
  const headerBlock = raw.slice(0, headerEnd);
  const body = raw.slice(headerEnd).replace(/^\r?\n\r?\n/, '');
  const headers = {};
  const lines = headerBlock.split(/\r?\n/);
  let cur = null;
  for (const line of lines) {
    if (/^[ \t]/.test(line) && cur) headers[cur] += ' ' + line.trim();
    else {
      const m = line.match(/^([^:]+):\s*(.*)$/);
      if (m) { cur = m[1].toLowerCase(); headers[cur] = m[2]; }
    }
  }
  const ctype = headers['content-type'] || 'text/plain';
  const boundaryMatch = ctype.match(/boundary="?([^";]+)"?/i);
  const parts = [];
  if (boundaryMatch) {
    const boundary = '--' + boundaryMatch[1];
    const sections = body.split(boundary);
    for (const sec of sections) {
      if (!sec.trim() || sec.trim() === '--') continue;
      const hEnd = sec.search(/\r?\n\r?\n/);
      if (hEnd === -1) continue;
      const partHeaders = {};
      sec.slice(0, hEnd).split(/\r?\n/).forEach(l => {
        const m = l.match(/^([^:]+):\s*(.*)$/);
        if (m) partHeaders[m[1].toLowerCase()] = m[2];
      });
      const partBody = sec.slice(hEnd).replace(/^\r?\n\r?\n/, '').replace(/\r?\n--$/, '');
      parts.push({ headers: partHeaders, body: partBody });
    }
  }
  return { headers, body, parts, boundary: boundaryMatch ? boundaryMatch[1] : null };
}

function analyzeEmailHeaders(headers) {
  const out = {};
  const auth = headers['authentication-results'] || '';
  out.spf = (auth.match(/spf=(\w+)/i) || [])[1] || (headers['received-spf']||'').match(/^(\w+)/)?.[1] || 'unknown';
  out.dkim = (auth.match(/dkim=(\w+)/i) || [])[1] || 'unknown';
  out.dmarc = (auth.match(/dmarc=(\w+)/i) || [])[1] || 'unknown';
  out.returnPath = headers['return-path'] || '(none)';
  out.from = headers['from'] || '(none)';
  out.to = headers['to'] || '(none)';
  out.subject = Conv.mimeDecode(headers['subject'] || '(none)');
  out.date = headers['date'] || '(none)';
  return out;
}

// ---------- JSON / XML / CSV ----------
function jsonToCsv(json) {
  const arr = Array.isArray(json) ? json : [json];
  if (!arr.length) return '';
  const keys = [...new Set(arr.flatMap(o => Object.keys(o||{})))];
  const esc = v => { v = v==null?'':String(v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  return [keys.join(','), ...arr.map(o => keys.map(k => esc(o[k])).join(','))].join('\n');
}
function csvToJson(csv) {
  const lines = csv.split(/\r?\n/).filter(l=>l);
  if (!lines.length) return [];
  const parseLine = l => {
    const out = []; let cur=''; let q=false;
    for (let i=0;i<l.length;i++){
      const c=l[i];
      if (q) { if (c==='"' && l[i+1]==='"'){cur+='"';i++} else if (c==='"') q=false; else cur+=c; }
      else { if (c==='"') q=true; else if (c===',') {out.push(cur);cur=''} else cur+=c; }
    }
    out.push(cur); return out;
  };
  const hdr = parseLine(lines[0]);
  return lines.slice(1).map(l => { const v = parseLine(l); const o = {}; hdr.forEach((h,i)=>o[h]=v[i]); return o; });
}
function xmlToJson(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const err = doc.querySelector('parsererror'); if (err) return {error:'Invalid XML'};
  const walk = node => {
    const obj = {};
    if (node.attributes) for (const a of node.attributes) obj['@'+a.name] = a.value;
    const kids = [...node.children];
    if (!kids.length) { const t = node.textContent.trim(); return Object.keys(obj).length ? {...obj, '#text':t} : t; }
    kids.forEach(c => {
      const v = walk(c);
      if (obj[c.tagName] !== undefined) { if (!Array.isArray(obj[c.tagName])) obj[c.tagName]=[obj[c.tagName]]; obj[c.tagName].push(v); }
      else obj[c.tagName] = v;
    });
    return obj;
  };
  return { [doc.documentElement.tagName]: walk(doc.documentElement) };
}
function jsonToXml(obj, rootName='root') {
  const esc = s => String(s).replace(/[<>&"']/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'})[c]);
  const build = (k, v) => {
    if (v === null || v === undefined) return `<${k}/>`;
    if (Array.isArray(v)) return v.map(x => build(k, x)).join('');
    if (typeof v === 'object') {
      const attrs = Object.keys(v).filter(x=>x.startsWith('@')).map(x=>` ${x.slice(1)}="${esc(v[x])}"`).join('');
      const inner = Object.entries(v).filter(([x])=>!x.startsWith('@') && x!=='#text').map(([kk,vv])=>build(kk,vv)).join('');
      const text = v['#text'] ? esc(v['#text']) : '';
      return `<${k}${attrs}>${text}${inner}</${k}>`;
    }
    return `<${k}>${esc(v)}</${k}>`;
  };
  return '<?xml version="1.0" encoding="UTF-8"?>\n' + build(rootName, obj);
}

// ---------- HASH / UUID ----------
function genHash(s, algo) {
  if (!window.CryptoJS) return 'CryptoJS not loaded';
  switch(algo) {
    case 'md5': return CryptoJS.MD5(s).toString();
    case 'sha1': return CryptoJS.SHA1(s).toString();
    case 'sha256': return CryptoJS.SHA256(s).toString();
    case 'sha512': return CryptoJS.SHA512(s).toString();
  }
}
function uuid4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0; const v = c==='x'?r:(r&0x3|0x8); return v.toString(16);
  });
}

// ---------- ENTROPY ----------
function entropy(s) {
  if (!s) return 0;
  const freq = {};
  for (const c of s) freq[c] = (freq[c]||0) + 1;
  const len = s.length;
  let H = 0;
  for (const k in freq) { const p = freq[k]/len; H -= p * Math.log2(p); }
  return H;
}

// ---------- COMPONENTS ----------
function el(tag, props={}, ...children) {
  const n = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') n.className = props[k];
    else if (k === 'style' && typeof props[k]==='object') Object.assign(n.style, props[k]);
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === 'html') n.innerHTML = props[k];
    else if (props[k] !== undefined && props[k] !== null) n.setAttribute(k, props[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return n;
}

function icon(name, size=16) {
  const i = el('i', {'data-lucide':name});
  i.style.width = size+'px'; i.style.height = size+'px';
  return i;
}

// Generic bidirectional encoder
function makeBidirectional(toolId, label, encodeFn, decodeFn) {
  Renderers[toolId] = () => {
    const wrap = el('div', {class:'space-y-3'});
    const counts = el('div', {class:'text-xs text-muted flex gap-4 mt-1'});
    const input = el('textarea', {class:'textarea', placeholder:'Input...'});
    const output = el('textarea', {class:'textarea', readonly:'true', placeholder:'Output...'});
    let mode = 'encode';
    const updateCounts = () => { counts.textContent = `${input.value.length} chars · ${new Blob([input.value]).size} bytes`; };
    const run = () => {
      if (!input.value) { output.value=''; updateCounts(); return; }
      try { output.value = mode==='encode' ? encodeFn(input.value) : decodeFn(input.value); }
      catch(e) { output.value = 'Error: ' + e.message; }
      addHistory(toolId, input.value, output.value);
      updateCounts();
    };
    input.addEventListener('input', run);
    const modeRow = el('div', {class:'flex items-center justify-between flex-wrap gap-2'},
      el('div', {class:'flex gap-1'},
        el('button', {class:'chip active', onclick:e=>{mode='encode';e.currentTarget.classList.add('active');e.currentTarget.nextElementSibling.classList.remove('active');run()}}, 'Encode'),
        el('button', {class:'chip', onclick:e=>{mode='decode';e.currentTarget.classList.add('active');e.currentTarget.previousElementSibling.classList.remove('active');run()}}, 'Decode'),
      ),
      el('div', {class:'flex gap-1'},
        el('button', {class:'btn btn-ghost', onclick:()=>copyText(output.value)}, icon('copy',14),'Copy'),
        el('button', {class:'btn btn-ghost', onclick:()=>{input.value='';output.value='';updateCounts()}}, icon('eraser',14),'Clear'),
        el('button', {class:'btn btn-ghost', onclick:()=>{const t=input.value;input.value=output.value;output.value=t;run()}}, icon('arrow-left-right',14),'Swap'),
      )
    );
    wrap.append(modeRow,
      el('div', {class:'split-grid'},
        el('div', null, el('label',{class:'text-xs text-muted block mb-1'},'Input'), input, counts),
        el('div', null, el('label',{class:'text-xs text-muted block mb-1'},'Output'), output)
      )
    );
    return wrap;
  };
}

  const out = el('textarea',{class:'textarea',readonly:'true',style:{minHeight:'120px'}});
  const dataUriCheck = el('input',{type:'checkbox',checked:'true'});
  const handle = (files) => {
    if (!files.length) return;
    const f = files[0];
    const r = new FileReader();
    r.onload = () => {
      const img = el('img',{src:r.result,style:{maxHeight:'200px',maxWidth:'100%',borderRadius:'.5rem'}});
      preview.innerHTML=''; preview.append(img);
      out.value = dataUriCheck.checked ? r.result : r.result.split(',')[1];
    };
    r.readAsDataURL(f);
  };
  const drop = makeDropZone(handle, 'image/*', true);
  dataUriCheck.addEventListener('change', () => {
    if (!out.value) return;
    if (dataUriCheck.checked && !out.value.startsWith('data:')) {
      const img = preview.querySelector('img');
      if (img) out.value = img.src;
    } else if (!dataUriCheck.checked && out.value.startsWith('data:')) {
      out.value = out.value.split(',')[1];
    }
  });
  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) if (item.type.startsWith('image/')) {
      handle([item.getAsFile()]); break;
    }
  });
  return el('div',{class:'space-y-3'},
    drop,
    preview,
    el('div',{class:'flex justify-between items-center'},
      el('label',{class:'flex items-center gap-2 text-sm'}, dataUriCheck, 'Include Data URI prefix'),
      el('button',{class:'btn btn-ghost', onclick:()=>copyText(out.value)}, icon('copy',14),'Copy')
    ),
    out
  );
};

// Image Metadata
Renderers['img-meta'] = () => {
  const out = el('div',{class:'space-y-2'});
  const drop = makeDropZone((files) => {
    if (!files.length) return;
    const f = files[0];
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const rows = [
          ['Filename', f.name], ['Format', f.type], ['Size', (f.size/1024).toFixed(2)+' KB'],
          ['Width', img.width+' px'], ['Height', img.height+' px'],
          ['Aspect ratio', (img.width/img.height).toFixed(3)],
        ];
        out.innerHTML='';
        out.append(el('img',{src:r.result,style:{maxHeight:'200px',maxWidth:'100%',borderRadius:'.5rem'}}));
        out.append(el('div',{class:'surface rounded-lg p-3'},
          ...rows.map(([k,v])=>el('div',{class:'flex justify-between text-sm py-1', style:{borderBottom:'1px solid var(--border)'}},
            el('span',{class:'text-muted'},k),el('span',null,v)
          ))
        ));
        // EXIF
        if (window.EXIF) {
          EXIF.getData(img, function() {
            const tags = EXIF.getAllTags(this);
            if (Object.keys(tags).length) {
              out.append(el('div',{class:'surface rounded-lg p-3'},
                el('div',{class:'text-xs font-semibold uppercase text-muted mb-2'},'EXIF data'),
                el('pre',{class:'mono',style:{margin:0,maxHeight:'200px',overflow:'auto'}}, JSON.stringify(tags,null,2))
              ));
            }
          });
        }
      };
      img.src = r.result;
    };
    r.readAsDataURL(f);
  }, 'image/*', true);
  return el('div',{class:'space-y-3'}, drop, out);
};

// OCR
Renderers['ocr'] = () => {
  const out = el('div',{class:'space-y-2'});
  const result = el('textarea',{class:'textarea',readonly:'true'});
  const status = el('div',{class:'text-xs text-muted'});
  const drop = makeDropZone(async (files) => {
    if (!files.length) return;
    if (!window.Tesseract) { status.textContent = 'Tesseract not loaded'; return; }
    status.textContent = 'Loading OCR engine...';
    try {
      const { data } = await Tesseract.recognize(files[0], 'eng', {
        logger: m => status.textContent = `${m.status} ${m.progress?Math.round(m.progress*100)+'%':''}`
      });

    } catch (e) { status.textContent = 'Error: '+e.message; }
  }, 'image/*', true);
  return el('div',{class:'space-y-3'}, drop, status,
    el('div',{class:'flex justify-end'}, el('button',{class:'btn btn-ghost', onclick:()=>copyText(result.value)}, icon('copy',14),'Copy')),
    result
  );
};

// JSON Formatter
Renderers['json-format'] = () => {
  const input = el('textarea',{class:'textarea'});
  const output = el('div',{class:'surface rounded-lg p-3',style:{minHeight:'200px',overflow:'auto'}});
  const status = el('div',{class:'text-xs'});
  const render = (mode) => {
    if (!input.value.trim()) { output.innerHTML=''; status.textContent=''; return; }
    try {
      const o = JSON.parse(input.value);
      if (mode==='pretty') { output.innerHTML=''; output.append(el('pre',{class:'mono',style:{margin:0}}, JSON.stringify(o,null,2))); }
      else if (mode==='min') { output.innerHTML=''; output.append(el('pre',{class:'mono',style:{margin:0}}, JSON.stringify(o))); }
      else if (mode==='tree') { output.innerHTML=''; output.append(renderTree(o)); }
      status.textContent = '✓ Valid JSON';
      status.style.color = 'var(--success)';
    } catch(e) {
      status.textContent = '✗ '+e.message;
      status.style.color = 'var(--danger)';
    }
  };
  const renderTree = (o, key) => {
    if (o === null) return el('span',{class:'mono'}, (key?key+': ':'')+'null');
    if (typeof o !== 'object') return el('span',{class:'mono'}, (key?key+': ':'')+JSON.stringify(o));
    const det = el('details',{open:'true'},
      el('summary',{class:'mono text-sm'}, (key?key+': ':'')+(Array.isArray(o)?'[':'{')+ ` ${Object.keys(o).length} `+(Array.isArray(o)?']':'}'))
    );
    const body = el('div',{class:'tree-node'});
    for (const k in o) body.append(renderTree(o[k], k));
    det.append(body);
    return det;
  };
  input.addEventListener('input', ()=>render('pretty'));
  return el('div',{class:'space-y-3'},
    el('div',{class:'flex gap-1 flex-wrap'},
      el('button',{class:'btn', onclick:()=>render('pretty')},icon('align-left',14),'Pretty'),
      el('button',{class:'btn', onclick:()=>render('min')},icon('minimize-2',14),'Minify'),
      el('button',{class:'btn', onclick:()=>render('tree')},icon('list-tree',14),'Tree'),
      el('div',{class:'ml-auto'},status)
    ),
    input,
    output
  );
};

// XML Formatter
Renderers['xml-format'] = () => {
  const input = el('textarea',{class:'textarea'});
  const output = el('textarea',{class:'textarea',readonly:'true'});
  const status = el('div',{class:'text-xs'});
  const fmt = (xml) => {
    let formatted = '', indent = '';
    xml.split(/>\s*</).forEach(node => {
      if (node.match(/^\/\w/)) indent = indent.substring(2);
      formatted += indent + '<' + node + '>\n';
      if (node.match(/^<?\w[^>]*[^\/]$/) && !node.startsWith('?')) indent += '  ';
    });
    return formatted.substring(1, formatted.length-2);
  };
  const run = (mode) => {
    if (!input.value.trim()) { output.value=''; return; }
    try {
      const doc = new DOMParser().parseFromString(input.value,'text/xml');
      const err = doc.querySelector('parsererror');
      if (err) { status.textContent='✗ Invalid XML'; status.style.color='var(--danger)'; output.value=err.textContent; return; }
      status.textContent='✓ Valid XML'; status.style.color='var(--success)';
      if (mode==='min') output.value = input.value.replace(/>\s+</g,'><').trim();
      else output.value = fmt(input.value.replace(/>\s+</g,'><'));
    } catch(e) { status.textContent='✗ '+e.message; status.style.color='var(--danger)'; }
  };
  input.addEventListener('input', ()=>run('pretty'));
  return el('div',{class:'space-y-3'},
    el('div',{class:'flex gap-1'},
      el('button',{class:'btn', onclick:()=>run('pretty')},'Pretty'),
      el('button',{class:'btn', onclick:()=>run('min')},'Minify'),
      el('div',{class:'ml-auto'},status)
    ),
    el('div',{class:'split-grid'},
      el('div',null,input),
      el('div',null,output))
  );
};

// Regex tester
Renderers['regex'] = () => {
  const pattern = el('input',{class:'input',placeholder:'\\d+'});
  const flags = el('input',{class:'input',placeholder:'gim',style:{maxWidth:'80px'}});
  const text = el('textarea',{class:'textarea',placeholder:'Test text...'});
  const out = el('div',{class:'surface rounded-lg p-3',style:{minHeight:'100px'}});
  const status = el('div',{class:'text-xs'});
  const run = () => {
    out.innerHTML='';
    if (!pattern.value) return;
    try {
      const re = new RegExp(pattern.value, flags.value || 'g');
      const matches = [...text.value.matchAll(re)];
      status.textContent = `${matches.length} match${matches.length!==1?'es':''}`;
      status.style.color = matches.length ? 'var(--success)' : 'var(--text-muted)';
      // Highlight
      let html = '', last = 0;
      for (const m of matches) {
        html += text.value.slice(last, m.index).replace(/</g,'&lt;');
        html += `<span class="highlight-match">${m[0].replace(/</g,'&lt;')}</span>`;
        last = m.index + m[0].length;
      }
      html += text.value.slice(last).replace(/</g,'&lt;');
      out.innerHTML = `<pre class="mono" style="margin:0">${html}</pre>`;
      if (matches.length) {
        out.append(el('div',{class:'mt-3 text-xs space-y-1'},
          ...matches.slice(0,20).map((m,i)=>el('div',null,
            el('span',{class:'text-muted'}, `#${i+1} @${m.index}: `),
            el('code',{class:'mono'}, m[0]),
            m.length>1 ? el('span',{class:'text-muted'}, ' groups: '+m.slice(1).join(', ')) : null
          ))
        ));
      }
    } catch(e) { status.textContent = '✗ '+e.message; status.style.color='var(--danger)'; }
  };
  pattern.addEventListener('input', run); flags.addEventListener('input', run); text.addEventListener('input', run);
  return el('div',{class:'space-y-3'},
    el('div',{class:'flex gap-2 items-center'},
      el('span',{class:'mono'},'/'), pattern, el('span',{class:'mono'},'/'), flags,
      el('div',{class:'ml-auto'},status)
    ),
    text, out
  );
};

// Diff Viewer (line-based LCS)
Renderers['diff'] = () => {
  const a = el('textarea',{class:'textarea'});
  const b = el('textarea',{class:'textarea'});
  const out = el('div',{class:'surface rounded-lg p-3'});
  const diff = () => {
    const aL = a.value.split('\n'); const bL = b.value.split('\n');
    // LCS
    const dp = Array(aL.length+1).fill(null).map(()=>Array(bL.length+1).fill(0));
    for (let i=1;i<=aL.length;i++) for (let j=1;j<=bL.length;j++)
      dp[i][j] = aL[i-1]===bL[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
    const result = [];
    let i=aL.length, j=bL.length;
    while (i>0 && j>0) {
      if (aL[i-1]===bL[j-1]) { result.unshift({t:' ',v:aL[i-1]}); i--;j--; }
      else if (dp[i-1][j]>=dp[i][j-1]) { result.unshift({t:'-',v:aL[i-1]}); i--; }
      else { result.unshift({t:'+',v:bL[j-1]}); j--; }
    }
    while (i>0) { result.unshift({t:'-',v:aL[--i]}); }
    while (j>0) { result.unshift({t:'+',v:bL[--j]}); }
    out.innerHTML='';
    result.forEach(r => out.append(el('div',{class:'mono text-xs',style:{
      background: r.t==='+' ? 'color-mix(in srgb,var(--success) 12%,transparent)' :
                 r.t==='-' ? 'color-mix(in srgb,var(--danger) 12%,transparent)' : 'transparent',
      color: r.t==='+' ? 'var(--success)' : r.t==='-' ? 'var(--danger)' : 'var(--text)',
      padding:'1px 6px'
    }}, r.t+' '+r.v)));
  };
  a.addEventListener('input', diff); b.addEventListener('input', diff);
  return el('div',{class:'space-y-3'},
    el('div',{class:'split-grid'},
      el('div',null,el('label',{class:'text-xs text-muted block mb-1'},'Original'),a),
      el('div',null,el('label',{class:'text-xs text-muted block mb-1'},'Modified'),b)
    ),
    el('label',{class:'text-xs text-muted block'},'Diff'),
    out
  );
};

// Hex Viewer
Renderers['hex-viewer'] = () => {
  const out = el('div',{class:'surface rounded-lg p-2 scroll-thin',style:{maxHeight:'500px',overflow:'auto'}});
  const drop = makeDropZone((files) => {
    if (!files.length) return;
    const r = new FileReader();
    r.onload = () => {
      const bytes = new Uint8Array(r.result);
      out.innerHTML='';
      for (let i=0; i<bytes.length; i+=16) {
        const chunk = bytes.slice(i, i+16);
        const offset = i.toString(16).padStart(8,'0');
        const hex = [...chunk].map(b=>b.toString(16).padStart(2,'0')).join(' ');
        const ascii = [...chunk].map(b => (b>=32 && b<127) ? String.fromCharCode(b) : '.').join('');
        out.append(el('div',{class:'hex-row'},
          el('span',{style:{color:'var(--text-muted)'}}, offset),
          el('span', null, hex),
          el('span',{style:{color:'var(--accent)'}}, ascii)
        ));
        if (i > 16384) { out.append(el('div',{class:'text-xs text-muted text-center p-2'},'Truncated after 1024 lines')); break; }
      }
    };
    r.readAsArrayBuffer(files[0]);
  }, '*', true);
  return el('div',{class:'space-y-3'}, drop, out);
};

// Entropy
Renderers['entropy'] = () => {
  const input = el('textarea',{class:'textarea',placeholder:'Text or data...'});
  const out = el('div',{class:'space-y-2'});
  input.addEventListener('input', () => {
    out.innerHTML='';
    if (!input.value) return;
    const H = entropy(input.value);
    const maxH = Math.log2(new Set(input.value).size || 1);
    const pct = (H/8)*100; // relative to 8-bit max
    const assessment = H < 1.5 ? 'Very low (highly compressible)' :
                      H < 3 ? 'Low (text-like)' :
                      H < 5 ? 'Medium (mixed content)' :
                      H < 7 ? 'High (random-ish)' : 'Very high (likely encrypted/compressed)';
    out.append(el('div',{class:'surface rounded-lg p-4 text-center'},
      el('div',{class:'text-xs text-muted uppercase tracking-wide'},'Shannon entropy'),
      el('div',{class:'text-3xl font-bold mt-1', style:{color:'var(--accent)'}}, H.toFixed(4)),
      el('div',{class:'text-xs text-muted mt-1'}, 'bits per character (max 8.0)'),
      el('div',{style:{height:'8px',background:'var(--surface-2)',borderRadius:'4px',margin:'.75rem 0',overflow:'hidden'}},
        el('div',{style:{width:pct+'%',height:'100%',background:'var(--accent)'}})
      ),
      el('div',{class:'text-sm'}, assessment)
    ));
    out.append(el('div',{class:'surface rounded-lg p-3 text-sm space-y-1'},
      el('div',{class:'flex justify-between'}, el('span',{class:'text-muted'},'Length'), el('span',null,input.value.length)),
      el('div',{class:'flex justify-between'}, el('span',{class:'text-muted'},'Unique chars'), el('span',null,new Set(input.value).size)),
      el('div',{class:'flex justify-between'}, el('span',{class:'text-muted'},'Max possible H'), el('span',null,maxH.toFixed(4)))
    ));
  });
  return el('div',{class:'space-y-3'}, input, out);
};

// QR Code
Renderers['qr'] = () => {
  let mode = 'gen';
  const wrap = el('div',{class:'space-y-3'});
  const renderUI = () => {
    wrap.innerHTML='';
    const modeRow = el('div',{class:'flex gap-1'},
      el('button',{class:'chip '+(mode==='gen'?'active':''),onclick:()=>{mode='gen';renderUI()}},'Generate'),
      el('button',{class:'chip '+(mode==='read'?'active':''),onclick:()=>{mode='read';renderUI()}},'Read'),
    );
    wrap.append(modeRow);
    if (mode==='gen') {
      const input = el('textarea',{class:'textarea',placeholder:'Text or URL...'});
      const target = el('div',{id:'qrtarget',class:'flex justify-center p-4 surface rounded-lg'});
      input.addEventListener('input', () => {
        target.innerHTML='';
        if (input.value && window.QRCode) new QRCode(target,{text:input.value,width:200,height:200});
      });
      wrap.append(input, target);
    } else {
      const result = el('textarea',{class:'textarea',readonly:'true'});
      const drop = makeDropZone(async (files) => {
        if (!files.length || !window.QrScanner) return;
        try {
          const r = await QrScanner.scanImage(files[0]);
          result.value = r;
        } catch(e) { result.value = 'No QR code found: '+e.message; }
      }, 'image/*', true);
      wrap.append(drop, result);
    }
  };
  renderUI();
  return wrap;
};

// PDF → Text
Renderers['pdf-extract'] = () => {
  const result = el('textarea',{class:'textarea',readonly:'true',style:{minHeight:'300px'}});
  const status = el('div',{class:'text-xs text-muted'});
  const meta = el('div',{class:'space-y-2'});
  const pageRange = el('input',{class:'input',placeholder:'e.g. 1-5 or 1,3,5 (blank=all)',style:{maxWidth:'240px'}});
  const preserveLayout = el('input',{type:'checkbox',checked:'true'});
  const parseRange = (str, total) => {
    if (!str.trim()) return Array.from({length:total},(_,i)=>i+1);
    const out = new Set();
    str.split(',').forEach(part => {
      const m = part.trim().match(/^(\d+)(?:-(\d+))?$/);
      if (!m) return;
      const a = +m[1], b = +(m[2]||m[1]);
      for (let i=a;i<=b && i<=total;i++) if (i>0) out.add(i);
    });
    return [...out].sort((a,b)=>a-b);
  };
  const drop = makeDropZone(async (files) => {
    if (!files.length) return;
    if (!window.pdfjsLib) { status.textContent='PDF.js not loaded'; return; }
    const f = files[0];
    status.textContent = 'Loading PDF...';
    meta.innerHTML = ''; result.value = '';
    try {
      const buf = await f.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data:buf}).promise;
      const info = await pdf.getMetadata().catch(()=>({info:{}}));
      meta.append(el('div',{class:'surface rounded-lg p-3 text-sm space-y-1'},
        el('div',{class:'flex justify-between'},el('span',{class:'text-muted'},'Filename'),el('span',null,f.name)),
        el('div',{class:'flex justify-between'},el('span',{class:'text-muted'},'Size'),el('span',null,(f.size/1024).toFixed(2)+' KB')),
        el('div',{class:'flex justify-between'},el('span',{class:'text-muted'},'Pages'),el('span',null,pdf.numPages)),
        info.info?.Title ? el('div',{class:'flex justify-between'},el('span',{class:'text-muted'},'Title'),el('span',null,info.info.Title)) : null,
        info.info?.Author ? el('div',{class:'flex justify-between'},el('span',{class:'text-muted'},'Author'),el('span',null,info.info.Author)) : null,
        info.info?.Producer ? el('div',{class:'flex justify-between'},el('span',{class:'text-muted'},'Producer'),el('span',null,info.info.Producer)) : null,
      ));
      const pages = parseRange(pageRange.value, pdf.numPages);
      let text = '';
      for (const n of pages) {
        status.textContent = `Extracting page ${n}/${pages[pages.length-1]}...`;
        const page = await pdf.getPage(n);
        const content = await page.getTextContent();
        if (preserveLayout.checked) {
          let lastY = null, line = '';
          const items = content.items.sort((a,b)=> (b.transform[5]-a.transform[5]) || (a.transform[4]-b.transform[4]));
          for (const it of items) {
            const y = Math.round(it.transform[5]);
            if (lastY !== null && Math.abs(y - lastY) > 2) { text += line + '\n'; line = ''; }
            line += it.str + (it.hasEOL?'\n':' ');
            lastY = y;
          }
          text += line + '\n';
        } else {
          text += content.items.map(i=>i.str).join(' ') + '\n';
        }
        text += `\n--- End of page ${n} ---\n\n`;
      }
      result.value = text.trim();
      status.textContent = `✓ Extracted ${pages.length} page(s) — ${result.value.length} chars`;
      status.style.color = 'var(--success)';
      addHistory('pdf-extract', f.name, result.value.slice(0,200));
    } catch(e) {
      status.textContent = '✗ Error: '+e.message;
      status.style.color = 'var(--danger)';
    }
  }, 'application/pdf', true);
  return el('div',{class:'space-y-3'},
    drop,
    el('div',{class:'flex gap-3 items-center flex-wrap'},
      el('label',{class:'text-xs text-muted'},'Pages:'), pageRange,
      el('label',{class:'flex items-center gap-1 text-xs'}, preserveLayout, 'Preserve layout'),
    ),
    status,
    meta,
    el('div',{class:'flex justify-between items-center'},
      el('label',{class:'text-xs text-muted'},'Extracted text'),
      el('div',{class:'flex gap-1'},
        el('button',{class:'btn btn-ghost', onclick:()=>copyText(result.value)}, icon('copy',14),'Copy'),
        el('button',{class:'btn btn-ghost', onclick:()=>{
          const blob = new Blob([result.value],{type:'text/plain'});
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = 'extracted.txt'; a.click();
        }}, icon('download',14),'Download'),
      )
    ),
    result
  );
};

// ---------- DROP ZONE HELPER ----------
function makeDropZone(handler, accept='*', singleImage=false) {
  const text = singleImage ? 'Drop image here, click to browse, or paste from clipboard' : 'Drop file here or click to browse';
  const zone = el('div',{class:'drop-zone'},
    icon('upload-cloud', 24),
    el('div',{class:'text-sm mt-2'}, text),
    el('div',{class:'text-xs text-muted mt-1'}, accept==='*'?'Any file type':accept)
  );
  const input = el('input',{type:'file',accept,style:{display:'none'}});
  zone.append(input);
  zone.addEventListener('click', ()=>input.click());
  input.addEventListener('change', e => handler([...e.target.files]));
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    handler([...e.dataTransfer.files]);
  });
  return zone;
}

// ---------- AUTH ----------
const ACCESS_CODES = {
  'KHALID-2026':   'Khalid',
  'WALID-2026':    'Walid',
  'REDA-2026':     'Reda',
  'MOHAMMED-2026': 'Mohammed',
  'KHADIJA-2026':  'Khadija',
  'CHAIMAE-2026':  'Chaimae',
  'ZINEB-2026':    'Zineb',
  'ANAS-2026':     'Anas',
  'MOHAMED-2026':  'Mohamed',
  'OMAR-2026':     'Omar',
  'AYMANE-2026':   'Aymane',
};

const Auth = {
  user: localStorage.getItem('udc-user') || null,
  login(code) {
    const k = code.trim().toUpperCase();
    if (ACCESS_CODES[k]) {
      this.user = ACCESS_CODES[k];
      localStorage.setItem('udc-user', this.user);
      return true;
    }
    return false;
  },
  logout() {
    this.user = null;
    localStorage.removeItem('udc-user');
    renderLogin();
  }
};

function renderLogin() {
  document.documentElement.classList.toggle('dark', State.theme === 'dark');
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.className = '';
  const wrap = el('div',{class:'login-wrap'});
  const input = el('input',{class:'input code-input', placeholder:'XXXXXX-XXXX', autofocus:'true', autocomplete:'off'});
  const err = el('div',{class:'text-xs text-center mt-2', style:{color:'var(--danger)',minHeight:'1rem'}});
  const card = el('div',{class:'login-card'});
  const tryLogin = () => {
    if (Auth.login(input.value)) {
      app.className = 'min-h-screen flex';
      render();
    } else {
      err.textContent = 'Invalid access code';
      card.classList.add('shake');
      setTimeout(()=>card.classList.remove('shake'), 400);
      input.value = ''; input.focus();
    }
  };
  card.append(
    el('div',{class:'flex flex-col items-center mb-6'},
      el('div',{class:'flex items-center justify-center mb-3', style:{width:'56px',height:'56px',background:'var(--accent)',borderRadius:'1rem',color:'#fff'}}, icon('zap',28)),
      el('div',{class:'text-xl font-bold'},'Universal Data Converter'),
      el('div',{class:'text-sm text-muted mt-1'},'Enter your access code to continue')
    ),
    el('label',{class:'text-xs text-muted block mb-1'},'Access code'),
    input,
    err,
    el('button',{class:'btn btn-primary w-full justify-center mt-4', onclick:tryLogin}, icon('log-in',14), 'Sign in'),
    el('div',{class:'text-xs text-muted text-center mt-4'},'Access is restricted to authorized users only')
  );
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  wrap.append(card);
  app.append(wrap);
  if (window.lucide) window.lucide.createIcons();
}

// ---------- MAIN RENDER ----------
function render() {
  document.documentElement.classList.toggle('dark', State.theme === 'dark');
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Sidebar
  const sidebar = el('aside', {class:'sidebar surface w-64 flex-shrink-0 flex flex-col'+(State.sidebarOpen?' open':''), style:{borderRight:'1px solid var(--border)'}},
    el('div', {class:'p-4', style:{borderBottom:'1px solid var(--border)'}},
      el('div', {class:'flex items-center gap-2'},
        el('div',{class:'flex items-center justify-center', style:{width:'32px',height:'32px',background:'var(--accent)',borderRadius:'.5rem',color:'#fff'}}, icon('zap',18)),
        el('div',null,
          el('div',{class:'font-bold text-sm'},'Universal Converter'),
          el('div',{class:'text-xs text-muted'},'All-in-one toolbox')
        )
      ),
      el('div',{class:'mt-3 relative'},
        el('input',{class:'input', placeholder:'Search tools...', value:State.search, oninput:e=>{State.search=e.target.value;render()}, style:{paddingLeft:'2rem'}}),
        el('div',{style:{position:'absolute',left:'.6rem',top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}, icon('search',14))
      )
    ),
    el('nav',{class:'flex-1 overflow-y-auto scroll-thin p-2 space-y-1'},
      ...Object.entries(TOOLS).map(([catId,cat])=>{
        const filtered = cat.tools.filter(t => !State.search || (t.name+' '+t.desc).toLowerCase().includes(State.search.toLowerCase()));
        if (State.search && !filtered.length) return null;
        return el('div',null,
          el('div',{class:'text-xs uppercase tracking-wider text-muted px-2 py-2 flex items-center gap-1.5'}, icon(cat.icon,12), cat.label),
          ...filtered.map(t => el('div',{class:'nav-item '+(State.activeTool===t.id?'active':''), onclick:()=>{State.activeCategory=catId;State.activeTool=t.id;State.sidebarOpen=false;render()}},
            el('span',{class:'flex-1'}, t.name),
            State.favorites.includes(t.id) ? icon('star',12) : null
          ))
        );
      }).filter(Boolean)
    ),
    el('div',{class:'p-3 space-y-2',style:{borderTop:'1px solid var(--border)'}},
      el('div',{class:'flex items-center gap-2 px-2 py-1'},
        el('div',{class:'flex items-center justify-center', style:{width:'28px',height:'28px',background:'var(--accent)',color:'#fff',borderRadius:'50%',fontSize:'.75rem',fontWeight:'600'}}, Auth.user?.[0]?.toUpperCase()||'?'),
        el('div',{class:'flex-1 min-w-0'},
          el('div',{class:'text-sm font-medium truncate'}, Auth.user||'Guest'),
          el('div',{class:'text-xs text-muted'},'Signed in')
        ),
        el('button',{class:'btn btn-ghost', onclick:()=>Auth.logout(), title:'Sign out'}, icon('log-out',14))
      ),
      el('button',{class:'btn w-full justify-center', onclick:()=>{State.theme=State.theme==='dark'?'light':'dark';saveState();render()}},
        icon(State.theme==='dark'?'sun':'moon',14),
        State.theme==='dark'?'Light mode':'Dark mode'
      )
    )
  );

  // Find active tool
  const cat = TOOLS[State.activeCategory];
  const tool = cat?.tools.find(t=>t.id===State.activeTool) || TOOLS.encoding.tools[0];
  const renderer = Renderers[tool.id];

  // Main content
  const isFav = State.favorites.includes(tool.id);
  const main = el('main',{class:'flex-1 overflow-y-auto scroll-thin'},
    el('header',{class:'sticky top-0 z-10 surface flex items-center gap-3 p-3', style:{borderBottom:'1px solid var(--border)'}},
      el('button',{class:'btn btn-ghost lg:hidden', onclick:()=>{State.sidebarOpen=!State.sidebarOpen;render()}}, icon('menu',16)),
      el('div',{class:'flex-1'},
        el('div',{class:'font-semibold'}, tool.name),
        el('div',{class:'text-xs text-muted'}, tool.desc)
      ),
      el('button',{class:'btn btn-ghost', onclick:()=>{
        if (isFav) State.favorites = State.favorites.filter(x=>x!==tool.id);
        else State.favorites.push(tool.id);
        saveState(); render();
      }}, icon(isFav?'star':'star',14), isFav?'Unfavorite':'Favorite')
    ),
    el('div',{class:'p-4 max-w-6xl mx-auto'},
      renderer ? renderer() : el('div',{class:'text-sm text-muted'},'Tool not implemented yet'),
      // History section
      State.history.length ? el('details',{class:'mt-8'},
        el('summary',{class:'text-sm font-medium py-2'}, `Recent (${State.history.length})`),
        el('div',{class:'space-y-1 mt-2'},
          ...State.history.slice(0,10).map(h => el('div',{class:'surface rounded-lg p-2 text-xs flex gap-3 items-center'},
            el('span',{class:'badge',style:{background:'var(--surface-2)'}}, h.tool),
            el('span',{class:'flex-1 truncate text-muted'}, h.input),
            el('span',{class:'text-xs text-muted'}, new Date(h.ts).toLocaleTimeString())
          ))
        )
      ) : null
    )
  );

  app.append(sidebar, main);
  if (window.lucide) window.lucide.createIcons();
}

if (Auth.user) render(); else renderLogin();
</script>
